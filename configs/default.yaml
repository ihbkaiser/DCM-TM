# ─── Continual Topic Model Configuration ────────────────────────────────────

data:
  dir: "data/NIPS"
  train_bow: "train_bow.npz"
  test_bow: "test_bow.npz"
  vocab: "vocab.txt"
  train_times: "train_times.txt"
  test_times: "test_times.txt"
  time2id: "time2id.txt"

vae:
  # Number of local topics per timestamp
  n_topics: 50
  # Hidden dimensions for encoder
  enc_hidden: 256
  # Latent dimension (= n_topics for ProdLDA)
  # Dropout on encoder input (BoW)
  dropout: 0.2
  # Training
  lr: 0.002
  weight_decay: 1.0e-6
  batch_size: 256
  epochs: 100
  patience: 10          # early stopping patience
  kl_warmup_epochs: 20  # linearly anneal KL weight from 0 → 1
  # Residual delta learning
  use_residual: true    # L_t = G_{t-1} + ΔL_t
  # Factorized decoder: topic logits are alpha_k dot vocabulary embeddings
  factorized_decoder: true

topics:
  # Number of top words to represent each topic
  top_m_words: 15
  # Embedding model for topic representations
  embedding_model: "all-MiniLM-L6-v2"
  # Number of nearest topics to consider in LLM curation
  top_k_nearest: 5
  # Cosine similarity threshold for "close" topics
  similarity_threshold: 0.7

llm:
  # Provider: "gemini" or "none" (skip LLM, use similarity-based fallback)
  provider: "gemini"
  # Model name (for Gemini)
  model: "gemini-2.0-flash"
  # Temperature for LLM calls
  temperature: 0.1
  # Max tokens per response
  max_tokens: 1024
  # Rate limiting (seconds between calls)
  rate_limit_delay: 0.5
  # Retry on failure
  max_retries: 3

  # Fallback thresholds (used when provider = "none")
  fallback:
    # If max cosine sim between global topic and any local topic < this → REMOVE
    prune_threshold: 0.3
    # If max cosine sim between local topic and any global topic < this → NOVEL
    novel_threshold: 0.5
    # Controls softness of fallback probabilities around thresholds
    soft_scale: 12.0

soft_memory:
  # Enable the soft fixed-slot DCM-TM update. If false, the original hard
  # retain/remove + novel/covered dynamic-K pipeline is used.
  enabled: true
  tau_assign: 0.1
  tau_replace: 0.1
  novelty_lambda: 0.3
  lambda_llm: 1.0
  eps: 1.0e-8

  # Lightweight controller trained after local topics and LLM priors exist.
  controller_lr: 0.001
  controller_epochs: 20
  controller_hidden: 16

  # Needed when document-topic vectors must be aligned across timestamps.
  infer_aligned_theta: true
  theta_epochs: 50
  theta_kl_warmup_epochs: 10

pipeline:
  # Output directory for results
  output_dir: "outputs"
  # Initial number of global topics (from T0)
  init_global_from_first: true
  # Max total topic slots in global memory (caps growth)
  max_topics: 200
  # Save intermediate results per timestamp
  save_intermediate: true
  # Random seed
  seed: 42
  # Device: "auto", "cpu", "cuda"
  device: "auto"

logging:
  level: "INFO"
